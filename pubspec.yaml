name: zupadel
description: Application mobile Padel - MVP v1.0
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0
  cloud_functions: ^5.1.3
  firebase_storage: ^12.3.0
  firebase_messaging: ^15.1.3

  # State management
  flutter_riverpod: ^2.4.10
  riverpod_annotation: ^2.3.4

  # Navigation
  go_router: ^13.2.0

  # Paiement
  flutter_stripe: ^10.1.1    # Web uniquement
  in_app_purchase: ^3.2.0    # iOS + Android (Apple IAP / Google Play Billing)

  # UI / UX
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  lottie: ^3.0.0
  fl_chart: ^0.66.2

  # Géolocalisation
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # Utilitaires
  intl: ^0.19.0
  uuid: ^4.3.3
  share_plus: ^7.2.2
  url_launcher: ^6.2.5
  image_picker: ^1.0.7
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  web: 1.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
